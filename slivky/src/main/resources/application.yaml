server:
  port: 8081

spring:
  config:
    import:
      - optional:file:.env[.properties]
  application:
    name: slivky
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:liquibase/db.changelog.yaml
    enabled: true
